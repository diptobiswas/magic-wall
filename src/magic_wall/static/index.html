<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Magic Wall</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite">
      <img id="wallpaper" class="wallpaper" alt="" />
      <div id="empty-art" class="empty-art" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <button id="touch-catcher" class="touch-catcher" type="button" aria-label="Show story details"></button>

      <section id="story-sheet" class="story-sheet" aria-label="Wallpaper story" aria-hidden="true">
        <header class="sheet-header">
          <div>
            <p id="status" class="status">Wallpaper Story</p>
            <h1>What It Is Based On</h1>
          </div>
          <div class="time-stack">
            <time id="clock">--:--</time>
            <span id="provider">local</span>
          </div>
          <button id="hide-story" class="hide-button" type="button">Hide</button>
        </header>

        <div class="story-grid">
          <article class="story-hero" aria-label="Selected news story">
            <div class="panel-kicker">
              <span id="lead-category">news anchor</span>
              <span id="lead-heat">current art</span>
            </div>
            <h2 id="lead-title">Loading story</h2>
            <p id="lead-summary">Waiting for the local service to load the current wallpaper context.</p>
            <p id="lead-why"></p>
            <div id="lead-tags" class="tag-row"></div>
            <a id="lead-source" class="source-link" href="#" target="_blank" rel="noreferrer">Open source</a>
          </article>

          <section class="story-meta-panel" aria-label="Wallpaper metadata">
            <div class="story-list-header">
              <span>Artwork</span>
              <span id="next-refresh"></span>
            </div>
            <div id="story-list" class="story-list"></div>
          </section>
        </div>

        <footer class="sheet-actions" aria-label="Actions">
          <div class="story-strip">
            <strong id="art-title">Magic Wall</strong>
            <span id="generated"></span>
          </div>
          <button id="regenerate" type="button">New art</button>
        </footer>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
