<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Magic Wall</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main id="app" class="app-shell" aria-live="polite">
      <img id="wallpaper" class="wallpaper" alt="" />
      <div id="empty-art" class="empty-art" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <button id="touch-catcher" class="touch-catcher" type="button" aria-label="Show dashboard"></button>

      <section id="dashboard" class="dashboard-sheet" aria-label="X Pulse" aria-hidden="true">
        <header class="sheet-header">
          <div>
            <p id="status" class="status">X Pulse</p>
            <h1>Live Signal</h1>
          </div>
          <div class="time-stack">
            <time id="clock">--:--</time>
            <span id="provider">offline</span>
          </div>
          <button id="hide-dashboard" class="hide-button" type="button">Hide</button>
        </header>

        <div class="pulse-grid">
          <article class="pulse-hero" aria-label="Top X signal">
            <div class="panel-kicker">
              <span id="lead-category">x pulse</span>
              <span id="lead-heat">watch</span>
            </div>
            <h2 id="lead-title">Loading signals</h2>
            <p id="lead-summary">Checking what people are talking about on X.</p>
            <p id="lead-why"></p>
            <div id="lead-tags" class="tag-row"></div>
            <a id="lead-source" class="source-link" href="#" target="_blank" rel="noreferrer">Open on X</a>
          </article>

          <section class="pulse-list-panel" aria-label="X pulse list">
            <div class="pulse-list-header">
              <span>Now</span>
              <span id="next-check"></span>
            </div>
            <div id="trend-list" class="trend-list"></div>
          </section>
        </div>

        <footer class="sheet-actions" aria-label="Actions">
          <div class="pulse-strip">
            <strong id="art-title">X Pulse</strong>
            <span id="generated"></span>
          </div>
          <button id="check-now" type="button">Refresh</button>
        </footer>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
