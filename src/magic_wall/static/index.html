<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Magic Wall</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main id="stage" class="stage" aria-live="polite">
      <img id="wallpaper" class="wallpaper" alt="" />
      <div id="empty-art" class="empty-art" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <section id="overlay" class="overlay" aria-label="Artwork details" aria-hidden="true">
        <div class="meta">
          <p id="status" class="status">Warming up</p>
          <h1 id="title">Magic Wall</h1>
          <p id="summary"></p>
          <div class="details">
            <span id="source"></span>
            <span id="generated"></span>
            <span id="next"></span>
            <span id="style"></span>
          </div>
        </div>
        <div class="actions">
          <button id="refresh" type="button">Regenerate</button>
          <button id="close" type="button">Hide</button>
        </div>
      </section>
    </main>
    <script src="/static/app.js" defer></script>
  </body>
</html>
